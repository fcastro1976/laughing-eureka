spring:
  datasource:
    url: jdbc:postgresql://database/inclusive_content_service
    driverClassName: org.postgresql.Driver
    username: inclusive_content_service
    password: inclusive_content_service

#  jpa:
#    show-sql: true
#    properties:
#      hibernate:
#        format_sql: true

springdoc:
  api-docs:
    enabled: true
    path: /inclusive-content-service/v3/api-docs
  swagger-ui:
    enabled: true
  model-converters:
    pageable-converter:
      enabled: true

logging:
  level:
    com.newdex.services.inclusivecontent: debug

inclusive-content:
  audio-generator:
    url: http://bridge-converter:8000
  file-service:
    url: http://file-service:8080
